<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styleDay03.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        font-family: "Inter", sans-serif;
        background-color: aliceblue;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="product">
      <div class="product_img">
        <img src="../product img/image 1.png" alt="Anh san pham" />
      </div>
      <div class="product_content">
        <div class="ten_sp">
          <p id="free">Free shipping</p>
          <h2>Razer Kraken Kitty Edt Gaming Headset Quartz</h2>
        </div>
        <div class="price_gr">
          <div class="old_price">1 599,000</div>
          <div class="price">799,000</div>
          <p style="font-size: 14px; opacity: 0.6">
            The offer is valid until April 3 or as long as stock lasts!
          </p>
        </div>
        <div>
          <button id="btn_primary">Add to cart</button>
          <p class="stock"><span class="dot"></span> 50+pcs, in stock</p>
        </div>
        <div class="btn_add btn_phu">
          <button id="btn1">
            <img src="../product img/Frame.svg" alt="Anh cai can" /><span class="textAdd"
              >Add to cart</span
            >
          </button>
          <button id="btn2">
            <img src="../product img/Vector.svg" alt="Anh trai tim" /><span class="textAdd"
              >Add to wishlist</span
           >
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
