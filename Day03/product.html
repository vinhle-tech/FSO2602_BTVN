<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../product.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="product-group">
      <div class="product-img">
        <img src="../product img/image 1.png" alt="Anh tai nghe" />
      </div>
      <div class="product-content">
        <div class="product-name">
          <p>Free shipping</p>
          <h2>Razer Kraken Kitty Edt Gaming Headset Quartz</h2>
        </div>
        <div class="price">
          <p class="old-price">1 599,000</p>
          <p class="new-price">799,000</p>
          <p class="notification">
            The offer is valid until April 3 or as long as stock lasts!
          </p>
        </div>
        <div class="btn-primary">
          <button>Add to cart</button>
          <p><i class="icon-dot"></i>50+ pcs. in stock.</p>
        </div>
        <div class="btn-secondary">
          <button class="btn-extra">
            <i class="fa-solid fa-scale-balanced"></i>Add to cart
          </button>
          <button class="btn-extra">
            <i class="fa-regular fa-heart"></i>Add to wishlist
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
