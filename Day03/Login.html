<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../Login.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="Login_group">
      <div class="Login">
        <h2>Login</h2>
      </div>

      <form action="">
        <div class="email">
          <label for="email">Email</label>
          <input class="input" type="email" placeholder="example@gmail.com" />
        </div>
        <div class="password">
          <div class="pass_forgotPass">
            <label for="password">Password</label>
            <a style="width: 113px;height: 16px; color: #007aff; text-decoration: none;font-size: 14px;" href="../index.html">Forgot password?</a>
          </div>
          <input class="input" type="password" placeholder="Your password" />
        </div>
        <button>Login</button>
        <p style="width: 272px; height: 16px; font-size: 14px;">
          Don't have account? <a style=" color: #007aff; text-decoration: none;" href="../index.html">Create new account</a>
        </p>
      </form>
    </div>
  </body>
</html>
