<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- icon link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Font-family -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>

    <!-- Reset CSS -->
    <link rel="stylesheet" href="../border-box-reset.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="../display-flex.css" />
    <link rel="stylesheet" href="../Bai01-kiem-tra.css" />
  </head>
  <body>
    <div class="container">
      <div class="header flex-between">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="search" placeholder="Search for a part-time job" />
        </div>
        <button><i class="fa-solid fa-map"></i> Use map</button>
      </div>

      <div class="table-content flex-center-wrap">
        <div class="content content1">
          <i class="fa-solid fa-couch"></i>
          <p>Furniture</p>
        </div>
        <div class="content content2">
          <i class="fa-solid fa-house"></i>
          <p>Property</p>
        </div>
        <div class="content content3">
          <i class="fa-solid fa-building"></i>
          <p>Job</p>
        </div>
        <div class="content content4">
          <i class="fa-solid fa-plane"></i>
          <p>Travel</p>
        </div>
        <div class="content content5">
          <i class="fa-solid fa-ship"></i>
          <p>Boat</p>
        </div>
        <div class="content content6">
          <i class="fa-solid fa-motorcycle"></i>
          <p>MC</p>
        </div>
        <div class="content content7">
          <i class="fa-solid fa-camera"></i>
          <p>Economy</p>
        </div>
        <div class="content content8">
          <i class="fa-solid fa-suitcase"></i>
          <p>Holiday</p>
        </div>
      </div>
    </div>
  </body>
</html>
